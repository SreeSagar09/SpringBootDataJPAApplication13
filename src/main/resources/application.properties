spring.application.name=SpringBootDataJPAApplication13

server.port=8080
server.servlet.context-path=/SpringBootDataJPAApplication13

spring.datasource.primary.url=jdbc:mysql://localhost:3306/practice_db
spring.datasource.primary.username=root
spring.datasource.primary.password=root123
spring.datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.primary.database-platform=org.hibernate.dialect.MySQL5Dialect
spring.jpa.primary.show-sql=true
spring.jpa.primary.properties.hibernate.format_sql=true
spring.jpa.primary.hibernate.ddl-auto=update

spring.datasource.secondary.url=jdbc:mysql://localhost:3306/practice_db2
spring.datasource.secondary.username=root
spring.datasource.secondary.password=root123
spring.datasource.secondary.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.secondary.database-platform=org.hibernate.dialect.MySQL5Dialect
spring.jpa.secondary.show-sql=true
spring.jpa.secondary.properties.hibernate.format_sql=true
spring.jpa.secondary.hibernate.ddl-auto=update

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
